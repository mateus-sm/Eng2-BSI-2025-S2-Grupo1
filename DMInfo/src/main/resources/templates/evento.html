<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Eventos</title>
    <link rel="shortcut icon" type="image/png" th:href="@{/images/BrasãoDemolay.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/styles/membros.css}">
    <link rel="stylesheet" th:href="@{/styles/evento.css}">
</head>
<body>

<a href="/app/principal" class="btn-home">
    <i class="bi bi-house-door-fill"></i> Página Principal
</a>

<div class="container">
    <div class="page-header">
        <img th:src="@{/images/BrasãoDemolay.png}" alt="Logo DM Info" class="logo-img">
        <h2>Gerenciar Eventos</h2>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0" id="formTitulo">Criar Evento</h5>
        </div>
        <div class="card-body">
            <form id="eventoForm">
                <input type="hidden" id="eventoId" value="" />
                <div class="row g-3">
                    <div class="col-md-5">
                        <label for="titulo" class="form-label">Título</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" required placeholder="Nome do evento...">
                    </div>
                    <div class="col-md-4">
                        <label for="descricao" class="form-label">Descrição</label>
                        <input type="text" class="form-control" id="descricao" name="descricao" required placeholder="Descrição do evento...">
                    </div>
                    <div class="col-md-3">
                        <label for="idAdmin" class="form-label">ID do Administrador</label>
                        <input type="number" class="form-control" id="idAdmin" name="idAdmin" required>
                    </div>
                </div>
                <div class="mt-3 d-grid">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Criar Evento</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row g-2 mb-4 align-items-end justify-content-center bg-light p-3 rounded shadow-sm">
        <div class="col-md-5">
            <label for="searchDesc" class="form-label">Pesquisar Descrição</label>
            <input type="text" class="form-control" id="searchDesc" placeholder="Digite parte da descrição...">
        </div>
        <div class="col-md-3">
            <label for="sortField" class="form-label">Ordenar por</label>
            <select class="form-select" id="sortField">
                <option value="tituloAsc">Título (A-Z)</option>
                <option value="idAsc">ID (Menor p/ Maior)</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="carregarEventos()">
                <i class="bi bi-funnel"></i> Aplicar Filtros
            </button>
        </div>
    </div>

    <div class="table-responsive table-container">
        <table class="table table-hover align-middle" id="eventosTableWrapper">
            <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Descrição</th>
                <th>Administrador</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody id="eventosTable"></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/evento.js}" defer></script>
</body>
</html>
