<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Membros</title>
    <link rel="shortcut icon" type="image/png" th:href="@{/images/BrasãoDemolay.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/styles/membros.css}">
</head>
<body>

<a href="/app/principal" class="btn-home">
    <i class="bi bi-house-door-fill"></i> Página Principal
</a>

<div class="container">
    <div class="page-header">
        <img th:src="@{/images/BrasãoDemolay.png}" alt="Logo" class="logo-img">
        <h2>Gerenciar Membros</h2>
    </div>

    <div class="row g-2 mb-4 align-items-end justify-content-center">
        <div class="col-12 col-md-4">
            <label for="termoBusca" class="form-label">Nome</label>
            <input type="text" class="form-control" id="termoBusca" placeholder="Buscar membro...">
        </div>
        <div class="col-6 col-md-3">
            <label for="filtroDtIni" class="form-label">A partir de</label>
            <input type="date" class="form-control" id="filtroDtIni">
        </div>
        <div class="col-6 col-md-3">
            <label for="filtroDtFim" class="form-label">Até</label>
            <input type="date" class="form-control" id="filtroDtFim">
        </div>
        <div class="col-12 col-md-2">
            <button class="btn btn-primary w-100" id="btn-novo-membro">
                <i class="bi bi-plus-lg"></i> Novo
            </button>
        </div>
    </div>

    <div class="table-responsive table-container">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Usuário</th>
                <th>Observação</th>
                <th>Início</th>
                <th>Fim</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody id="tabela-membros"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="membroModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="membroModalLabel">Membro</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="msg-erro-modal" class="alert alert-danger d-none"></div>
                <form id="form-membro" novalidate>
                    <input type="hidden" id="membroId">
                    <input type="hidden" id="dtIniHidden">

                    <div class="form-floating mb-3">
                        <select class="form-select" id="usuarioId" required>
                            <option value="" selected disabled>Selecione um usuário...</option>
                        </select>
                        <label for="usuarioId">Selecionar Usuário *</label>
                        <div class="invalid-feedback" id="feedback-usuarioId">Selecione um usuário.</div>
                    </div>

                    <div class="form-floating mb-3">
                        <textarea class="form-control" id="observacao" placeholder="Obs" style="height: 100px"></textarea>
                        <label for="observacao">Observações</label>
                    </div>

                    <div class="form-floating mb-3" id="campo-dtFim">
                        <input type="date" class="form-control" id="dtFim">
                        <label for="dtFim">Data de Encerramento</label>
                        <div class="invalid-feedback" id="feedback-dtFim">Data inválida.</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btn-salvar-membro">Salvar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center">
            <div class="modal-header border-0"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body py-4">
                <p class="mb-0">Deseja excluir este membro?</p>
                <small class="text-danger">Esta ação é permanente.</small>
                <div id="msg-erro-delete" class="alert alert-danger mt-3 d-none"></div>
            </div>
            <div class="modal-footer justify-content-center border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger" id="btn-confirmar-exclusao">Sim, Excluir</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/membros.js}"></script>
</body>
</html>
