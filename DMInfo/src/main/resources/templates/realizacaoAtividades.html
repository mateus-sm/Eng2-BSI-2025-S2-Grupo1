<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Realização de Atividades</title>
    <link rel="shortcut icon" type="image/png" th:href="@{/images/BrasãoDemolay.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/styles/membros.css}">
    <link rel="stylesheet" th:href="@{/styles/realizacao_atividades.css}">
</head>
<body>

<a href="/app/principal" class="btn-home">
    <i class="bi bi-house-door-fill"></i> Página Principal
</a>

<div class="container">
    <div class="page-header">
        <img th:src="@{/images/BrasãoDemolay.png}" alt="Logo DM Info" class="logo-img">
        <h2>Realização de Atividades</h2>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0" id="formTitulo">Criar Atividade</h5>
        </div>
        <div class="card-body">
            <form id="atividadeForm">
                <input type="hidden" id="atividadeId" value="" />
                <input type="hidden" id="idFormEdicao" value="" />
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="idAtividade" class="form-label">ID da Atividade</label>
                        <input type="number" class="form-control" id="idAtividade" required>
                    </div>
                    <div class="col-md-4">
                        <label for="idAdmin" class="form-label">ID do Administrador</label>
                        <input type="number" class="form-control" id="idAdmin" required>
                    </div>
                    <div class="col-md-4">
                        <label for="horario" class="form-label">Horário</label>
                        <input type="time" class="form-control" id="horario" step="1" required>
                    </div>
                    <div class="col-md-6">
                        <label for="local" class="form-label">Local</label>
                        <input type="text" class="form-control" id="local" required>
                    </div>
                    <div class="col-md-6">
                        <label for="dtIni" class="form-label">Data Início</label>
                        <input type="date" class="form-control" id="dtIni" required>
                    </div>
                    <div class="col-md-6">
                        <label for="custoPrevisto" class="form-label">Custo Previsto</label>
                        <input type="number" class="form-control" id="custoPrevisto" step="0.01" required>
                    </div>
                    <div class="col-md-6">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea class="form-control" id="observacoes" rows="3"></textarea>
                    </div>
                </div>
                <div class="mt-3 d-grid">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Criar Atividade</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Finalizar Atividade</h5>
        </div>
        <div class="card-body">
            <form id="finalizarForm">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="finalizarId" class="form-label">ID da Atividade</label>
                        <input type="number" class="form-control" id="finalizarId" required>
                    </div>
                    <div class="col-md-3">
                        <label for="dtFim" class="form-label">Data Fim Real</label>
                        <input type="date" class="form-control" id="dtFim" required>
                    </div>
                    <div class="col-md-3">
                        <label for="custoReal" class="form-label">Custo Real</label>
                        <input type="number" class="form-control" id="custoReal" step="0.01" required>
                    </div>
                    <div class="col-md-3">
                        <label for="observacoesFim" class="form-label">Observações Finais</label>
                        <textarea class="form-control" id="observacoesFim" rows="2"></textarea>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Finalizar e Registrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="row g-2 mb-4 align-items-end justify-content-center bg-light p-3 rounded shadow-sm">
        <div class="col-md-5">
            <label for="searchDesc" class="form-label">Pesquisar por Descrição da Atividade</label>
            <input type="text" class="form-control" id="searchDesc" placeholder="Descrição da Atividade">
        </div>
        <div class="col-md-3">
            <label for="sortField" class="form-label">Ordenar por</label>
            <select class="form-select" id="sortField">
                <option value="idAsc">ID (Menor p/ Maior)</option>
                <option value="dtIniAsc">Data Início</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="carregarAtividades()">
                <i class="bi bi-funnel"></i> Aplicar Filtros
            </button>
        </div>
    </div>

    <div class="table-responsive table-container">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Atividade</th>
                <th>Admin</th>
                <th>Local</th>
                <th>Data/Hora</th>
                <th>Custo Previsto</th>
                <th>Custo Real</th>
                <th>Status</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody id="atividadesTable"></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/realizacao_atividades.js}" defer></script>
</body>
</html>
