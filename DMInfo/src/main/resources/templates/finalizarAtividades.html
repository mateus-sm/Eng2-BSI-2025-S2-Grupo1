<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Atividades</title>
    <link rel="shortcut icon" type="image/png" th:href="@{/images/BrasãoDemolay.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/styles/membros.css}">
    <link rel="stylesheet" th:href="@{/styles/finalizarAtividades.css}">
</head>
<body>

<a href="/app/principal" class="btn-home">
    <i class="bi bi-house-door-fill"></i> Página Principal
</a>

<div class="container">
    <div class="page-header">
        <img th:src="@{/images/BrasãoDemolay.png}" alt="Logo DM Info" class="logo-img">
        <h2>Finalizar Atividades</h2>
    </div>

    <div class="row g-2 mb-4 align-items-end justify-content-center bg-light p-3 rounded shadow-sm">
        <div class="col-md-5">
            <label for="barra-pesquisa" class="form-label">Buscar</label>
            <input type="text" class="form-control" id="barra-pesquisa" placeholder="Buscar por nome da atividade, admin ou local...">
        </div>
        <div class="col-md-4">
            <label for="ordenacao-select" class="form-label">Ordenar por</label>
            <select class="form-select" id="ordenacao-select" onchange="carregarAtividades(this.value)">
                <option value="alfabetica">Nome da Atividade (A-Z) - Padrão</option>
                <option value="status_aberta">Status (Não Finalizadas Primeiro)</option>
                <option value="status_finalizada">Status (Finalizadas Primeiro)</option>
            </select>
        </div>
        <div class="col-md-3 text-end">
            <button class="btn btn-primary w-100" onclick="filtrarAtividades()">
                <i class="bi bi-search"></i> Buscar
            </button>
        </div>
    </div>

    <div class="table-responsive table-container">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Admin</th>
                <th>Atividade</th>
                <th>Local</th>
                <th>Horário</th>
                <th>Data Início</th>
                <th>Data Fim</th>
                <th>Custo Previsto</th>
                <th>Custo Real</th>
                <th>Observações</th>
                <th class="text-center">Ação</th>
            </tr>
            </thead>
            <tbody id="tabela-corpo">
            <tr>
                <td colspan="10" class="text-center text-muted py-4">Carregando atividades...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/finalizarAtividades.js}" defer></script>
</body>
</html>
