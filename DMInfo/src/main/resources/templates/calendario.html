<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Atividades</title>
    <link rel="shortcut icon" type="image/png" th:href="@{/images/BrasãoDemolay.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/styles/membros.css}">
    <link rel="stylesheet" th:href="@{/styles/calendario.css}">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
</head>
<body>

<a href="/app/principal" class="btn-home">
    <i class="bi bi-house-door-fill"></i> Página Principal
</a>

<div class="container">
    <div class="page-header">
        <img th:src="@{/images/BrasãoDemolay.png}" alt="Logo DM Info" class="logo-img">
        <h2>Calendário de Atividades</h2>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="mb-3">
                        <label for="mostrar-realizadas-checkbox" class="form-label">
                            <input type="checkbox" id="mostrar-realizadas-checkbox">
                            Mostrar atividades já realizadas
                        </label>
                    </div>
                    <div class="mb-3 pesquisa-atividades-container">
                        <label for="pesquisa-atividades" class="form-label">Pesquisar Atividades</label>
                        <input type="text" class="form-control" id="pesquisa-atividades" placeholder="Pesquisar atividades..." oninput="filtrarEOrdenarAtividades(this.value)">
                    </div>
                    <div class="mb-3 sync-button-container text-center">
                        <button class="btn btn-outline-secondary w-100" id="btn-sync-calendar">
                            <i class="bi bi-arrow-repeat"></i> Sincronizar Google Agenda
                        </button>
                    </div>
                    <h6 class="fw-bold mt-3 mb-2">Atividades Cadastradas</h6>
                    <div id="lista-atividades-lateral">
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body" id="calendario-container">
                    <div id="calendario"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="membros-modal-backdrop" class="modal-backdrop-custom" style="display: none;"></div>
<div id="membros-modal-container" class="modal-custom-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 600px; margin: auto; border-radius: 15px;">
        <div class="modal-header">
            <h5 class="modal-title" id="membros-modal-titulo">Gerenciar Membros da Atividade</h5>
            <button type="button" class="btn-close fechar-modal-btn" aria-label="Close"></button>
        </div>
        <div class="modal-body membros-modal-body" id="membros-modal-body">
            <input type="text" class="form-control mb-3" id="pesquisa-membros" placeholder="Pesquisar membros..." oninput="filtrarMembros()">
            <p>Carregando membros...</p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="btn-salvar-membros" onclick="fecharGerenciadorMembros()">Fechar</button>
        </div>
    </div>
</div>

<div id="toast-container">
    <span id="toast-message">Mensagem aqui...</span>
    <button id="toast-close-btn" onclick="fecharToast()">&times;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/calendario.js}"></script>
</body>
</html>
