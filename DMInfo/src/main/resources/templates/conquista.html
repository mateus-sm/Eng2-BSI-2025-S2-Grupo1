<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gerenciar Conquistas</title>
        <link rel="shortcut icon" type="image/png" th:href="@{/images/BrasãoDemolay.png}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" th:href="@{/styles/membros.css}">
        <link rel="stylesheet" th:href="@{/styles/conquista.css}">
    </head>

    <body>
    <a href="/app/principal" class="btn-home">
        <i class="bi bi-house-door-fill"></i> Página Principal
    </a>

    <div class="container mt-5 mb-5">
        <div class="page-header">
            <img th:src="@{/images/BrasãoDemolay.png}" alt="Logo DM Info" class="logo-img">
            <h2>Gerenciar Conquistas</h2>
        </div>

        <!-- Formulário -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Adicionar/Editar Conquista</h5>
            </div>
            <div class="card-body">
                <form id="formConquista" class="needs-validation" novalidate>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-9">
                            <label for="descricao" class="form-label asterisco">Descrição:</label>
                            <input type="text" id="descricao" class="form-control" placeholder="Digite a descrição da conquista" required>
                            <div class="invalid-feedback">A descrição é obrigatória.</div>
                            <input type="hidden" id="idConquista">
                        </div>
                        <div class="col-md-3 d-flex align-items-center">
                            <button type="submit" class="btn btn-primary w-100" id="btnSalvar">Salvar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Mensagens de feedback -->
        <div id="alertaContainer"></div>

        <!-- Seção de Filtro -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-9">
                        <label for="filtroDescricao" class="form-label fw-semibold">Buscar por Descrição:</label>
                        <input type="text" id="filtroDescricao" class="form-control" placeholder="Ex: Primeira vitória, Melhor score...">
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button type="button" class="btn btn-success flex-grow-1" id="btnFiltrar">Filtrar</button>
                        <button type="button" class="btn btn-outline-secondary" id="btnLimparFiltro" title="Limpar filtros"><i class="bi bi-x-lg"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabela -->
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Lista de Conquistas (<span id="totalConquistas">0</span>)</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th class="text-white text-center" style="width:60px;">ID</th>
                            <th class="text-white">Descrição</th>
                            <th class="text-white text-center" style="width:140px;">Ações</th>
                        </tr>
                        </thead>
                        <tbody id="tabelaConquistas"></tbody>
                    </table>
                </div>
                <div id="mensagemVazia" class="text-center py-5 text-muted d-none">
                    <p>Nenhuma conquista encontrada.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/conquista.js}"></script>
    </body>
</html>
